# docker-compose.service-mesh.yml
# Запуск: docker compose -f docker-compose.service-mesh.yml up --build

services:

  # ─── Registry backend ───────────────────────────────────────────────────────
  registry:
    build:
      context: ./backend/service-mesh
      dockerfile: Dockerfile
    container_name: sm-registry
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      INSTANCE_TTL_SECONDS: 30
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - sm-net

  # ─── UI frontend ────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./frontend/service-mesh
      dockerfile: Dockerfile
      args:
        # Браузер обращается к backend напрямую через порт хоста
        VITE_API_URL: http://localhost:4000
    container_name: sm-ui
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - sm-net

networks:
  sm-net:
    driver: bridge
