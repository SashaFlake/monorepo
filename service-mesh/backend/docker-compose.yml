# docker compose up --build
# control-plane : http://localhost:4000
# mock-service  : http://localhost:3001

services:

  # ── Control Plane ────────────────────────────────────────────────────────────
  control-plane:
    build:
      context: ./service-mesh
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV:              production
      PORT:                  4000
      HOST:                  0.0.0.0
      LOG_LEVEL:             info
      INSTANCE_TTL_SECONDS:  30
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout:  3s
      retries:  5
      start_period: 10s
    restart: unless-stopped

  # ── Mock Service ─────────────────────────────────────────────────────────────
  mock-service:
    build:
      context: ./mock-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT:          3001
      HOST:          0.0.0.0
      SERVICE_NAME:  mock-service
      # Имя, по которому control-plane будет слать healthcheck внутри сети
      SERVICE_HOST:  mock-service
      REGISTRY_URL:  http://control-plane:4000
      HEARTBEAT_MS:  10000
      ENV_LABEL:     dev
      VERSION:       "0.1.0"
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped
