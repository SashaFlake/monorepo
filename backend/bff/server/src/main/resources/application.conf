ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.sashaflake.ApplicationKt.module ]
    }
}

jwt {
    secret = ${JWT_SECRET}
    issuer = "http://0.0.0.0:8080/"
    audience = "http://0.0.0.0:8080/"
    realm = "Access to bff service"
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}
