# =============================================================================
# docker-compose.yml — production-like local stack
# Services: app, postgres, kafka (KRaft mode — no ZooKeeper), kafka-ui
# Usage:
#   docker compose up -d          # start everything
#   docker compose up -d postgres kafka  # infra only
#   docker compose logs -f app    # follow app logs
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: mdm-core-node:latest
    container_name: mdm-core-node-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mdm}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-mdm_core}?schema=public
      KAFKA_BROKERS: kafka:9092
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - mdm-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mdm-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB:       ${POSTGRES_DB:-mdm_core}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - mdm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdm} -d ${POSTGRES_DB:-mdm_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Kafka 3.7 — KRaft mode (no ZooKeeper)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: mdm-core-kafka
    restart: unless-stopped
    environment:
      # KRaft settings
      KAFKA_NODE_ID:                        1
      KAFKA_PROCESS_ROLES:                  broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS:       1@kafka:9093

      # Listeners
      # INTERNAL — inter-container, EXTERNAL — host machine, CONTROLLER — KRaft
      KAFKA_LISTENERS:                      INTERNAL://kafka:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS:           INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:     INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES:      CONTROLLER

      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:      "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR:     1
      KAFKA_NUM_PARTITIONS:                 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:  1

      # Performance / retention
      KAFKA_LOG_RETENTION_HOURS:            168
      KAFKA_LOG_SEGMENT_BYTES:              1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"   # host access
    networks:
      - mdm-net
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Kafka UI — web console (dev convenience, excluded in prod override)
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mdm-core-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:            local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED:           "true"
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    networks:
      - mdm-net

# =============================================================================
volumes:
  postgres-data:
  kafka-data:

networks:
  mdm-net:
    driver: bridge
