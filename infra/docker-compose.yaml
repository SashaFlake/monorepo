services:
  app:
    build:
      context: ../auth
      dockerfile: ../infra/Dockerfile
    container_name: auth-service-app
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      JWT_SECRET: "change-me-in-production"
      JWT_ISSUER: "auth-service"
      JWT_AUDIENCE: "auth-service-users"
      STORAGE_BACKEND: "dragonfly"
      DRAGONFLY_HOST: "dragonfly"
      DRAGONFLY_PORT: "6379"
    depends_on:
      dragonfly:
        condition: service_healthy
    networks:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/metrics > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: auth-service-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - observability

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: auth-service-nginx-exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx:8080/stub_status
    expose:
      - "9113"
    depends_on:
      - nginx
    networks:
      - observability

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: auth-service-dragonfly
    restart: unless-stopped
    command: dragonfly --logtostderr
    ports:
      - "6379:6379"
    ulimits:
      memlock: -1
    networks:
      - observability
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  dragonfly-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: auth-service-dragonfly-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://dragonfly:6379"
    expose:
      - "9121"
    depends_on:
      dragonfly:
        condition: service_healthy
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: auth-service-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app
      - cadvisor
      - dragonfly-exporter
      - nginx-exporter
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.1.4
    container_name: auth-service-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - observability

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: auth-service-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - observability

volumes:
  prometheus_data:
  grafana_data:

networks:
  observability:
    driver: bridge
